<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meus Pedidos - Ninko's Cookies</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .container-pedidos { width: 90%; max-width: 600px; margin: 150px auto 50px; padding: 20px; }
        .card-historico { 
            background: #ffffff;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            border: 2px solid #f7b2b7;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            transition: transform 0.2s;
        }
        .card-historico:hover { transform: translateY(-2px); }
        .header-pedido { display: flex; justify-content: space-between; border-bottom: 1px solid #f9f9f9; padding-bottom: 10px; margin-bottom: 10px; align-items: center; }
        .data-pedido { font-size: 0.85rem; color: #888; }
        
        /* Badges de Status Sincronizadas com Admin */
        .status-badge { padding: 5px 12px; border-radius: 20px; font-size: 0.7rem; font-weight: bold; text-transform: uppercase; color: white; }
        .status-realizado { background: #f39c12; }
        .status-producao { background: #d63384; }
        .status-rota { background: #3498db; }
        .status-finalizado { background: #27ae60; }
        .status-cancelado { background: #ff4d4d; }

        .item-pedido-discreto { font-size: 0.9rem; color: #555; margin-bottom: 3px; display: flex; justify-content: space-between; }
        .total-pedido-cliente { margin-top: 10px; text-align: right; font-weight: bold; color: #d63384; font-size: 1.1rem; border-top: 1px dashed #eee; padding-top: 8px; }
        
        /* Estilo para o motivo do cancelamento */
        .motivo-cancelamento {
            margin-top: 10px; padding: 8px; background: #fff1f1; border-radius: 6px;
            border: 1px solid #ffcccc; color: #c62828; font-size: 0.85rem;
        }
    </style>
</head>
<body>

    <div class="menu-fixo">
         <header>
            <div class="header-side">
                <a href="index.html" class="btn-auth" style="display: flex; align-items: center; gap: 8px;">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
                    Voltar
                </a>
            </div> 

            <div class="logo-container">
                <a href="index.html">
                    <img id="img-logo" src="img/logos/ninkos_logo.png" alt="Logo da Ninko's Cookies">
                </a>
            </div>

            <div class="header-side auth-area"></div>
        </header>
    </div>

    <main class="container-pedidos">
        <h2 style="margin-bottom: 25px; text-align: center; color: #d63384;">Meu Histórico de Cookies 🍪</h2>
        <div id="lista-meus-pedidos">
            <p style="text-align: center;">Carregando suas delícias...</p>
        </div>
    </main>

    <script type="module">
        import { auth, db } from "./firebase-config.js";
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { collection, query, where, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // --- LÓGICA DE NOTIFICAÇÃO DO CLIENTE ---
        if (Notification.permission !== "granted") { Notification.requestPermission(); }
        function enviarNotificacao(titulo, corpo) {
            if (Notification.permission === "granted") {
                new Notification(titulo, { body: corpo, icon: "img/logos/ninkos_logo.png" });
            }
        }

        const listaContainer = document.getElementById('lista-meus-pedidos');
        let statusAnterior = {}; // Para comparar e saber se o status mudou

        onAuthStateChanged(auth, (user) => {
            if (user) {
                const q = query(
                    collection(db, "pedidos"), 
                    where("clienteId", "==", user.uid),
                    orderBy("data", "desc")
                );

                onSnapshot(q, (snapshot) => {
                    // Monitoramento de mudanças para alertas
                    snapshot.docChanges().forEach((change) => {
                        const p = change.doc.data();
                        const id = change.doc.id;
                        
                        if (change.type === "modified") {
                            if (statusAnterior[id] && statusAnterior[id] !== p.status) {
                                enviarNotificacao(
                                    `Pedido Atualizado! 🍪`, 
                                    `Seu pedido #${id.slice(-5).toUpperCase()} agora está: ${p.status.toUpperCase()}`
                                );
                            }
                        }
                        statusAnterior[id] = p.status;
                    });

                    if (snapshot.empty) {
                        listaContainer.innerHTML = `
                            <div style="text-align: center; padding: 40px;">
                                <p style="color:#888;">Você ainda não fez nenhum pedido. 😢</p>
                                <a href="index.html" style="display:inline-block; margin-top:15px; text-decoration:none; color:#d63384; font-weight:bold;">Ver Cardápio</a>
                            </div>`;
                        return;
                    }

                    listaContainer.innerHTML = "";
                    snapshot.forEach((doc) => {
                        const p = doc.data();
                        const dataFormatada = p.data ? p.data.toDate().toLocaleString('pt-BR') : 'Processando...';
                        
                        const statusClass = {
                            'realizado': 'status-realizado',
                            'em produção': 'status-producao',
                            'em rota': 'status-rota',
                            'finalizado': 'status-finalizado',
                            'cancelado': 'status-cancelado'
                        };

                        const card = document.createElement('div');
                        card.className = 'card-historico';
                        
                        let itensHTML = "";
                        if (p.itens && Array.isArray(p.itens)) {
                            itensHTML = p.itens.map(i => `
                                <div class="item-pedido-discreto">
                                    <span>${i.quantidade}x ${i.nome}</span><br>
                                <div class="item-pedido-discreto"> 
                                    Frete: ${p.frete.toFixed(2)}
                                    <span style="color:#aaa;">R$ ${(i.precoUnitario * i.quantidade).toFixed(2)}</span>
                                </div>
                            `).join('');
                        }

                        card.innerHTML = `
                            <div class="header-pedido">
                                <span class="data-pedido">📅 ${dataFormatada}</span>
                                <span class="status-badge ${statusClass[p.status] || 'status-realizado'}">
                                    ${p.status || 'Realizado'}
                                </span>
                            </div>
                            <div class="corpo-pedido">
                                ${itensHTML}
                            </div>
                            
                            ${p.status === 'cancelado' && p.motivoCancelamento ? `
                                <div class="motivo-cancelamento">
                                    <strong>Motivo do cancelamento:</strong><br>${p.motivoCancelamento}
                                </div>
                            ` : ''}

                            <div class="total-pedido-cliente">
                                Total: R$ ${p.total.toFixed(2)}
                            </div>
                        `;
                        listaContainer.appendChild(card);
                    });
                }, (error) => {
                    console.error("Erro ao carregar pedidos:", error);
                });
            } else {
                window.location.href = "login.html";
            }
        });
    </script>
    <script type="module" src="auth-control.js"></script>
</body>
</html>
