<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acessar Ninko's Cookies</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .grid-campos { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .hidden { display: none !important; }
        #status-msg { margin-top: 10px; text-align: center; font-size: 0.9rem; font-weight: bold; min-height: 1.2rem; }
        .login-box { max-width: 450px; margin: auto; transition: all 0.3s ease; }
        input, select { margin-bottom: 10px; width: 100%; padding: 0.8rem; border: 1px solid #ccc; border-radius: 5px; }
        select { background-color: white; cursor: pointer; }
    </style>
</head>
<body class="admin-body">
    <div class="menu-fixo">
        <header>
            <div class="header-side"></div> 
            <div class="logo-container">
                <a href="index.html">
                    <img id="img-logo" src="img/logos/ninkos_logo.png" alt="Logo da Ninko's Cookies">
                </a>
            </div>
            <div class="header-side auth-area">
                <div id="menu-user"></div>
            </div>
        </header>
    </div>

    <main class="conteudo-login" style="margin-top: 150px; padding-bottom: 50px;">
        <div class="login-box">
            <h2 id="auth-title">Entrar na Ninko's 🍪</h2>
            
            <div id="campos-cadastro" class="hidden">
                <input type="text" id="cad-nome" placeholder="Nome Completo">
                <input type="tel" id="cad-tel" placeholder="WhatsApp (DDD + Número)">
                
                <div class="grid-campos">
                    <input type="text" id="cad-cep" placeholder="CEP">
                    <select id="cad-bairro">
                        <option value="">Carregando bairros...</option>
                    </select>
                </div>

                <input type="text" id="cad-rua" placeholder="Nome da Rua/Av">
                <div class="grid-campos">
                    <input type="text" id="cad-num" placeholder="Nº">
                    <input type="text" id="cad-comp" placeholder="Complemento">
                </div>
                <hr style="margin: 10px 0; border: 0.5px solid #eee;">
            </div>

            <input type="email" id="email" placeholder="E-mail" required>
            <input type="password" id="password" placeholder="Senha" required>
                <p id="reset-pass-area" style="text-align: right; margin-top: -5px; margin-bottom: 15px;">
                    <a href="#" id="link-recuperar" style="color: #666; font-size: 0.8rem;">Esqueci minha senha</a>
                </p>
            <button id="btn-auth-principal" class="botao-navegacao ativo" style="width: 100%;">Entrar</button>
            
            <p id="toggle-text" style="text-align: center; margin-top: 15px; font-size: 0.85rem;">
                Não tem uma conta? <a href="#" id="link-alternar" style="color: #d63384; font-weight: bold;">Criar Conta agora</a>
            </p>

            <p id="status-msg"></p>
        </div>
    </main>

    <script type="module">
        import { auth, db } from "./firebase-config.js";
        import { signInWithEmailAndPassword, createUserWithEmailAndPassword, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { doc, setDoc, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const status = document.getElementById('status-msg');
        const authTitle = document.getElementById('auth-title');
        const btnPrincipal = document.getElementById('btn-auth-principal');
        const camposCadastro = document.getElementById('campos-cadastro');
        const linkAlternar = document.getElementById('link-alternar');
        const toggleText = document.getElementById('toggle-text');
        const selectBairro = document.getElementById('cad-bairro');

        let modoCadastro = false;

        // Função para carregar os bairros que você cadastrou no Admin
        async function carregarBairros() {
            try {
                const q = query(collection(db, "bairros"), orderBy("nome", "asc"));
                const querySnapshot = await getDocs(q);
                
                selectBairro.innerHTML = '<option value="">Selecione seu bairro...</option>';
                
                querySnapshot.forEach((doc) => {
                    const b = doc.data();
                    const option = document.createElement('option');
                    option.value = b.nome;
                    option.textContent = `${b.nome}`;
                    selectBairro.appendChild(option);
                });
            } catch (err) {
                selectBairro.innerHTML = '<option value="">Erro ao carregar bairros</option>';
            }
        }

        // Alternar entre Login e Cadastro
        linkAlternar.addEventListener('click', (e) => {
            e.preventDefault();
            modoCadastro = !modoCadastro;
            status.innerText = "";

            if (modoCadastro) {
                authTitle.innerText = "Crie sua conta 🍪";
                btnPrincipal.innerText = "Finalizar Cadastro";
                camposCadastro.classList.remove('hidden');
                toggleText.innerHTML = `Já tem conta? <a href="#" id="link-alternar" style="color: #d63384; font-weight: bold;">Fazer Login</a>`;
                carregarBairros(); // Carrega os bairros ao abrir o cadastro
            } else {
                authTitle.innerText = "Entrar na Ninko's 🍪";
                btnPrincipal.innerText = "Entrar";
                camposCadastro.classList.add('hidden');
                toggleText.innerHTML = `Não tem uma conta? <a href="#" id="link-alternar" style="color: #d63384; font-weight: bold;">Criar Conta agora</a>`;
            }
            document.getElementById('link-alternar').onclick = (e) => linkAlternar.click();
        });

        // Local para colar a lógica de recuperação
        const linkRecuperar = document.getElementById('link-recuperar');
            linkRecuperar.addEventListener('click', async (e) => {
                e.preventDefault();
                const email = document.getElementById('email').value.trim();
                if (!email) {
                    status.innerText = "⚠️ Digite seu e-mail para recuperar a senha.";
                    status.style.color = "#d63384";
                    return;
                }
                try {
                    status.innerText = "Enviando e-mail de recuperação...";
                    await sendPasswordResetEmail(auth, email);
                    status.innerText = "✅ E-mail de redefinição enviado!";
                    status.style.color = "green";
                } catch (error) {
                    status.innerText = "❌ Erro: " + error.code;
                    status.style.color = "#d63384";
                }
            });
        
        // Lógica de Autenticação
        btnPrincipal.addEventListener('click', async () => {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();

            if (!email || !password) {
                status.innerText = "⚠️ Preencha e-mail e senha.";
                status.style.color = "#d63384";
                return;
            }
            <input type="password" id="password" placeholder="Senha" required>
            
            <p id="reset-pass-area" style="text-align: right; margin-top: -5px; margin-bottom: 15px;">
                <a href="#" id="link-recuperar" style="color: #666; font-size: 0.8rem;">Esqueci minha senha</a>
            </p>
            status.innerText = modoCadastro ? "Criando conta..." : "Entrando...";
            btnPrincipal.disabled = true;

            try {
                if (modoCadastro) {
                    const nome = document.getElementById('cad-nome').value.trim();
                    const bairro = selectBairro.value;

                    if(!nome) throw { code: 'custom/no-name' };
                    if(!bairro) throw { code: 'custom/no-bairro' };

                    const userCred = await createUserWithEmailAndPassword(auth, email, password);
                    
                    await setDoc(doc(db, "usuarios", userCred.user.uid), {
                        nome: nome,
                        telefone: document.getElementById('cad-tel').value.trim(),
                        cep: document.getElementById('cad-cep').value.trim(),
                        bairro: bairro, // Salva o nome do bairro selecionado
                        rua: document.getElementById('cad-rua').value.trim(),
                        numero: document.getElementById('cad-num').value.trim(),
                        complemento: document.getElementById('cad-comp').value.trim(),
                        email: email,
                        cargo: 'cliente',
                        dataCadastro: new Date().toISOString()
                    });

                    status.innerText = "✅ Conta criada com sucesso!";
                } else {
                    await signInWithEmailAndPassword(auth, email, password);
                    status.innerText = "✅ Bem-vindo de volta!";
                }

                setTimeout(() => window.location.href = "index.html", 1200);

            } catch (error) {
                btnPrincipal.disabled = false;
                status.style.color = "#d63384";
                
                if (error.code === 'custom/no-name') status.innerText = "⚠️ Digite seu nome completo.";
                else if (error.code === 'custom/no-bairro') status.innerText = "⚠️ Selecione um bairro para entrega.";
                else if (error.code === 'auth/email-already-in-use') status.innerText = "❌ E-mail já cadastrado.";
                else if (error.code === 'auth/weak-password') status.innerText = "❌ Senha muito curta (mín. 6).";
                else if (error.code === 'auth/invalid-credential') status.innerText = "❌ E-mail ou senha incorretos.";
                else status.innerText = "❌ Erro: " + error.code;
            }
        });
        const linkRecuperar = document.getElementById('link-recuperar');
            
            linkRecuperar.addEventListener('click', async (e) => {
                e.preventDefault();
                const email = document.getElementById('email').value.trim();
            
                if (!email) {
                    status.innerText = "⚠️ Digite seu e-mail para recuperar a senha.";
                    status.style.color = "#d63384";
                    document.getElementById('email').focus();
                    return;
                }
            
                try {
                    status.innerText = "Enviando e-mail de recuperação...";
                    status.style.color = "#555";
                    
                    await sendPasswordResetEmail(auth, email);
                    
                    status.innerText = "✅ E-mail de redefinição enviado! Verifique sua caixa de entrada.";
                    status.style.color = "green";
                } catch (error) {
                    console.error("Erro ao recuperar:", error);
                    if (error.code === 'auth/user-not-found') {
                        status.innerText = "❌ E-mail não encontrado no sistema.";
                    } else {
                        status.innerText = "❌ Erro ao enviar e-mail. Tente novamente.";
                    }
                    status.style.color = "#d63384";
                }
            });
    </script>
    <script type="module" src="auth-control.js"></script>
</body>
</html>
