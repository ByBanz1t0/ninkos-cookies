<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Ninko's Cookies</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        #auth-message { margin-top: 1rem; font-weight: bold; text-align: center; font-size: 0.85rem; }
        .input-erro { border-color: #d63384 !important; background-color: #fff0f1; }
    </style>
</head>
<body class="admin-body">
    <div class="menu-fixo">
        <header>
            <div class="header-side"></div> 
            <div class="logo-container">
                <a href="index.html">
                    <img id="img-logo" src="img/logos/ninkos_logo.png" alt="Logo da Ninko's Cookies">
                </a>
            </div>
            <div class="header-side auth-area">
                <div id="menu-login"><a href="login.html" class="btn-auth">Entrar</a></div>
                <div id="menu-user" class="hidden"></div>
                <div id="menu-logout" class="hidden"><a href="#" class="btn-auth-sair">Sair</a></div>
            </div>
        </header>
    </div>

    <main class="conteudo-login">
        <div class="login-box">
            <h2 id="auth-title">Entrar na Ninko's</h2>
            <input type="email" id="email" placeholder="Seu e-mail" required>
            <input type="password" id="password" placeholder="Sua senha" required>
            <button id="btn-login" class="botao-navegacao ativo" style="width: 100%; margin-bottom: 10px;">Entrar</button>
            <button id="btn-ir-cadastro" class="botao-navegacao" style="width: 100%;" onclick="location.href='cadastro.html'">Criar Conta</button>
            <p id="auth-message"></p>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAEyl-g55Qc646M8lhlCpKvQCoux5gG4VA",
            authDomain: "ninkos-cookies.firebaseapp.com",
            projectId: "ninkos-cookies",
            storageBucket: "ninkos-cookies.firebasestorage.app",
            messagingSenderId: "1065814927466",
            appId: "1:1065814927466:web:405c7357f761d98ea3c213"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const msgArea = document.getElementById('auth-message');

        document.getElementById('btn-login').addEventListener('click', async () => {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();

            try {
                await signInWithEmailAndPassword(auth, email, password);
                window.location.href = "perfil.html"; 
            } catch (error) {
                if (error.code === 'auth/user-not-found' || error.code === 'auth/invalid-credential') {
                    msgArea.innerHTML = `❌ Conta não encontrada. <br><a href="cadastro.html" style="color:#d63384; text-decoration: underline;">Deseja criar uma conta agora?</a>`;
                } else {
                    msgArea.innerText = "❌ E-mail ou senha incorretos.";
                    msgArea.style.color = "#d63384";
                }
            }
        });
    </script>
    <script type="module" src="js/auth-control.js"></script>
</body>
</html>
