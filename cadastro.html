<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Ninko's Cookies</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .grid-campos { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .login-box input { margin-bottom: 10px; }
        #status-msg { 
            margin-top: 10px; 
            text-align: center; 
            font-size: 0.9rem; 
            font-weight: bold;
            min-height: 1.2rem;
        }
    </style>
</head>
<body class="admin-body">
    <div class="conteudo-login">
        <div class="login-box" style="max-width: 500px;">
            <h2>Crie sua conta 🍪</h2>
            
            <input type="text" id="cad-nome" placeholder="Nome Completo">
            <input type="email" id="cad-email" placeholder="E-mail">
            <input type="password" id="cad-senha" placeholder="Senha (mín. 6 caracteres)">
            <input type="tel" id="cad-tel" placeholder="WhatsApp (DDD + Número)">
            
            <div class="grid-campos">
                <input type="text" id="cad-cep" placeholder="CEP">
                <input type="text" id="cad-bairro" placeholder="Bairro">
            </div>
            <input type="text" id="cad-rua" placeholder="Nome da Rua/Av">
            <div class="grid-campos">
                <input type="text" id="cad-num" placeholder="Nº da Residência">
                <input type="text" id="cad-comp" placeholder="Complemento">
            </div>

            <button id="btn-registrar" class="botao-navegacao ativo" style="width: 100%;">Finalizar Cadastro</button>
            <p id="status-msg"></p>
            
            <p style="margin-top: 15px; font-size: 0.8rem;">
                Já tem conta? <a href="login.html" style="color: #d63384; font-weight: bold;">Faça Login</a>
            </p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // SUA CONFIGURAÇÃO DO FIREBASE (Mantenha sempre esta)
        const firebaseConfig = {
            apiKey: "AIzaSyAEyl-g55Qc646M8lhlCpKvQCoux5gG4VA",
            authDomain: "ninkos-cookies.firebaseapp.com",
            projectId: "ninkos-cookies",
            storageBucket: "ninkos-cookies.firebasestorage.app",
            messagingSenderId: "1065814927466",
            appId: "1:1065814927466:web:405c7357f761d98ea3c213"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const btnRegistrar = document.getElementById('btn-registrar');
        const status = document.getElementById('status-msg');

        btnRegistrar.addEventListener('click', async () => {
            // Pegando os valores e removendo espaços vazios nas pontas
            const email = document.getElementById('cad-email').value.trim();
            const senha = document.getElementById('cad-senha').value.trim();
            const nome = document.getElementById('cad-nome').value.trim();
            const tel = document.getElementById('cad-tel').value.trim();
            const cep = document.getElementById('cad-cep').value.trim();
            const bairro = document.getElementById('cad-bairro').value.trim();
            const rua = document.getElementById('cad-rua').value.trim();
            const num = document.getElementById('cad-num').value.trim();
            const comp = document.getElementById('cad-comp').value.trim();

            // Validação simples antes de enviar ao Firebase
            if (!email || !senha || !nome) {
                status.innerText = "⚠️ Por favor, preencha Nome, E-mail e Senha.";
                status.style.color = "#d63384";
                return;
            }

            status.innerText = "Processando cadastro... 🍪";
            status.style.color = "#555";
            btnRegistrar.disabled = true;

            try {
                // Tenta criar o usuário no Authentication
                const userCred = await createUserWithEmailAndPassword(auth, email, senha);
                
                // Se deu certo, salva os dados adicionais no Firestore
                await setDoc(doc(db, "usuarios", userCred.user.uid), {
                    nome: nome,
                    telefone: tel,
                    cep: cep,
                    bairro: bairro,
                    rua: rua,
                    numero: num,
                    complemento: comp,
                    email: email,
                    dataCadastro: new Date().toISOString()
                });

                status.innerText = "✅ Cadastro realizado! Redirecionando...";
                status.style.color = "green";
                
                setTimeout(() => {
                    window.location.href = "perfil.html";
                }, 1500);

            } catch (error) {
                btnRegistrar.disabled = false;
                console.error("Erro ao cadastrar:", error.code);

                // TRATAMENTO DE ERROS SUGERIDO:
                if (error.code === 'auth/email-already-in-use') {
                    status.innerHTML = "❌ Este e-mail já está em uso. <br>Tente fazer <a href='login.html' style='color:#d63384'>Login</a>.";
                } else if (error.code === 'auth/weak-password') {
                    status.innerText = "❌ A senha deve ter pelo menos 6 caracteres.";
                } else if (error.code === 'auth/invalid-email') {
                    status.innerText = "❌ Formato de e-mail inválido.";
                } else {
                    status.innerText = "❌ Erro ao cadastrar. Tente novamente mais tarde.";
                }
                status.style.color = "#d63384";
            }
        });
    </script>
</body>
</html>
