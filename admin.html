<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Admin - Ninko's Cookies</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .admin-body { background-color: #fae5e7; padding-bottom: 50px; }
        .form-admin, .lista-admin { 
            padding: 2rem; max-width: 800px; margin: 2rem auto; 
            background: white; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        
        /* Seção de Pedidos com 4 colunas (2 por linha) */
        .secao-pedidos { max-width: 1100px !important; margin: 2rem auto; }
        
        .grid-pedidos {
            display: grid;
            grid-template-columns: 1fr 1fr; /* 2 colunas por linha */
            gap: 20px;
            margin-top: 20px;
        }

        .coluna-pedidos {
            background: #fdf2f3; 
            padding: 15px; 
            border-radius: 8px; 
            min-height: 400px; 
            border: 1px solid #eec0c5;
            width: 100%;
        }

        .coluna-pedidos h3 {
            font-size: 0.95rem; margin-bottom: 15px; padding-bottom: 8px;
            border-bottom: 2px solid #d63384; color: #d63384; text-transform: uppercase; text-align: center;
        }

        .card-pedido { 
            background: #fff; border-radius: 8px; padding: 12px; margin-bottom: 12px; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.05); font-size: 0.85rem; 
        }

        /* Estilos Gerais */
        .filtros-topo { display: flex; justify-content: center; align-items: center; gap: 15px; margin-bottom: 20px; background: #fff; padding: 10px; border-radius: 8px; }
        .filtros-topo select { width: auto; margin-bottom: 0; }
        
        input, textarea, select { width: 100%; padding: 0.8rem; margin-bottom: 1rem; border: 1px solid #ccc; border-radius: 5px; }
        .btn-salvar { background: #f7b2b7; border: 2px solid #5f5f5f; padding: 1rem; cursor: pointer; font-weight: bold; width: 100%; border-radius: 5px; }
        table { width: 100%; border-collapse: collapse; margin-top: 1rem; font-size: 0.9rem; }
        th, td { padding: 12px; border-bottom: 1px solid #eee; text-align: left; }
        .img-tabela { width: 50px; height: 50px; object-fit: cover; border-radius: 5px; }
        .btn-excluir { background: #ff4d4d; color: white; border: none; padding: 5px 10px; cursor: pointer; border-radius: 3px; }
        
        .status-loja-container { display: flex; justify-content: space-between; align-items: center; background: #fff; padding: 1.5rem; border-radius: 10px; max-width: 800px; margin: 2rem auto; border: 2px solid #d63384; }
        .status-indicador { font-weight: bold; padding: 8px 15px; border-radius: 20px; }
        .aberta { background: #e8f5e9; color: #2e7d32; }
        .fechada { background: #ffebee; color: #c62828; }
        .grid-horarios { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; align-items: center; margin-bottom: 10px; }
        
        @media (max-width: 900px) { .grid-pedidos { grid-template-columns: 1fr; } .secao-pedidos { max-width: 95%; } }
        #conteudo-protegido { display: none; }
        .hidden { display: none; }
    </style>
</head>
<body class="admin-body">

    <div class="menu-fixo">
        <header>
            <div class="header-side"><a href="index.html" class="btn-auth">← Voltar</a></div> 
            <div class="logo-container"><img id="img-logo" src="img/logos/ninkos_logo.png"></div>
            <div class="header-side auth-area"><div id="menu-user"></div></div>
        </header>
    </div>

    <main id="conteudo-protegido" style="margin-top: 150px;">
        
        <div class="status-loja-container">
            <div><h3>Status da Loja</h3><p id="label-status" class="status-indicador fechada">Carregando...</p></div>
            <button id="btn-toggle-loja" class="btn-salvar" style="width: auto;">Alterar Status</button>
        </div>

        <div class="form-admin">
            <h2>Horários de Funcionamento ⏰</h2>
            <div id="container-inputs-horarios"></div>
            <button type="button" id="btn-salvar-horarios" class="btn-salvar">Atualizar Horários</button>
        </div>
        
        <div class="form-admin">
            <h1 id="titulo-form">Adicionar Novo Sabor</h1>
            <form id="form-produto">
                <input type="hidden" id="produto-id"> 
                <input type="text" id="nome" placeholder="Nome do Sabor" required>
                <textarea id="descricao" placeholder="Descrição..." required></textarea>
                <input type="text" id="preco" placeholder="Preço (Ex: 12.00)" required>
                <select id="categoria"><option value="cookies">Cookies</option><option value="milk-shakes">Milk Shakes</option></select>
                <input type="text" id="imagemUrl" placeholder="Caminho da Imagem" required>
                <button type="submit" class="btn-salvar">Salvar no Cardápio</button>
                <button type="button" id="btn-cancelar" class="hidden">Cancelar Edição</button>
            </form>
        </div>

        <div class="lista-admin">
            <h2>Sabores Atuais</h2>
            <table><thead><tr><th>Foto</th><th>Nome</th><th>Preço</th><th>Ações</th></tr></thead><tbody id="tabela-produtos"></tbody></table>
        </div>

        <div class="form-admin">
            <h2 id="titulo-bairro">Cadastrar Bairro e Frete</h2>
            <form id="form-bairro">
                <input type="hidden" id="bairro-id">
                <input type="text" id="bairro-nome" placeholder="Ex: Centro" required>
                <input type="text" id="bairro-frete" placeholder="Valor do Frete" required>
                <button type="submit" class="btn-salvar">Salvar Bairro</button>
                <button type="button" id="btn-cancelar-bairro" class="hidden">Cancelar</button>
            </form>
        </div>

        <div class="lista-admin">
            <h2>Bairros Atendidos</h2>
            <table><thead><tr><th>Bairro</th><th>Taxa</th><th>Ações</th></tr></thead><tbody id="tabela-bairros"></tbody></table>
        </div>

        <div class="lista-admin secao-pedidos">
            <h2>📦 Gestão de Pedidos</h2>
            <div class="filtros-topo">
                <span>Filtrar por:</span>
                <select id="filtro-periodo">
                    <option value="todas">Todo o período</option>
                    <option value="24h">Últimas 24 horas</option>
                    <option value="7d">Últimos 7 dias</option>
                    <option value="30d">Últimos 30 dias</option>
                </select>
            </div>

            <div class="grid-pedidos">
                <div class="coluna-pedidos"><h3>🔔 Realizados</h3><div id="col-realizado"></div></div>
                <div class="coluna-pedidos"><h3>👨‍🍳 Produção / 🚚 Rota</h3><div id="col-producao-rota"></div></div>
                <div class="coluna-pedidos" style="background:#e8f5e9;"><h3>✅ Finalizados</h3><div id="col-finalizado"></div></div>
                <div class="coluna-pedidos" style="background:#ffebee;"><h3>❌ Cancelados</h3><div id="col-cancelado"></div></div>
            </div>
        </div>
    </main>

    <script type="module">
        import { db, auth } from "./firebase-config.js";
        import { collection, onSnapshot, deleteDoc, doc, updateDoc, query, orderBy, getDoc, serverTimestamp, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const configRef = doc(db, "configuracoes", "status_loja");
        const formProduto = document.getElementById('form-produto');
        const formBairro = document.getElementById('form-bairro');
        const filtroPeriodo = document.getElementById('filtro-periodo');

        // --- STATUS E HORÁRIOS ---
        const diasSemana = [{id:'seg',nome:'Segunda'},{id:'ter',nome:'Terça'},{id:'qua',nome:'Quarta'},{id:'qui',nome:'Quinta'},{id:'sex',nome:'Sexta'},{id:'sab',nome:'Sábado'},{id:'dom',nome:'Domingo'}];
        document.getElementById('container-inputs-horarios').innerHTML = diasSemana.map(dia => `<div class="grid-horarios"><span>${dia.nome}</span><input type="time" id="${dia.id}-inicio"><input type="time" id="${dia.id}-fim"></div>`).join('');

        async function carregarHorariosNaTela() {
            const docSnap = await getDoc(configRef);
            if (docSnap.exists() && docSnap.data().horarios) {
                const h = docSnap.data().horarios;
                diasSemana.forEach(dia => {
                    if(h[dia.id]) {
                        document.getElementById(`${dia.id}-inicio`).value = h[dia.id].inicio;
                        document.getElementById(`${dia.id}-fim`).value = h[dia.id].fim;
                    }
                });
            }
        }

        document.getElementById('btn-salvar-horarios').addEventListener('click', async () => {
            const h = {};
            diasSemana.forEach(dia => { h[dia.id] = { inicio: document.getElementById(`${dia.id}-inicio`).value, fim: document.getElementById(`${dia.id}-fim`).value }; });
            await updateDoc(configRef, { horarios: h });
            alert("Horários salvos!");
        });

        function monitorarStatusLoja() {
            onSnapshot(configRef, (snap) => {
                if (snap.exists()) {
                    const aberta = snap.data().aberta;
                    document.getElementById('label-status').innerText = aberta ? "LOJA ABERTA" : "LOJA FECHADA";
                    document.getElementById('label-status').className = `status-indicador ${aberta ? 'aberta' : 'fechada'}`;
                }
            });
        }

        document.getElementById('btn-toggle-loja').addEventListener('click', async () => {
            const snap = await getDoc(configRef);
            if (snap.exists()) await updateDoc(configRef, { aberta: !snap.data().aberta });
        });

        // --- PRODUTOS ---
        formProduto.addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('produto-id').value;
            const dados = {
                nome: document.getElementById('nome').value,
                descricao: document.getElementById('descricao').value,
                preco: parseFloat(document.getElementById('preco').value),
                categoria: document.getElementById('categoria').value,
                imagemUrl: document.getElementById('imagemUrl').value
            };
            id ? await updateDoc(doc(db, "produtos", id), dados) : await addDoc(collection(db, "produtos"), dados);
            formProduto.reset(); resetForm();
        });

        function carregarProdutos() {
            onSnapshot(collection(db, "produtos"), (snap) => {
                const tbody = document.getElementById('tabela-produtos');
                tbody.innerHTML = "";
                snap.forEach(d => {
                    const p = d.data();
                    tbody.innerHTML += `<tr><td><img src="${p.imagemUrl}" class="img-tabela"></td><td>${p.nome}</td><td>R$ ${p.preco.toFixed(2)}</td>
                    <td><button onclick="editarProduto('${d.id}','${p.nome}','${p.descricao}','${p.preco}','${p.categoria}','${p.imagemUrl}')">Editar</button>
                    <button class="btn-excluir" onclick="excluirDoc('produtos','${d.id}')">X</button></td></tr>`;
                });
            });
        }

        window.editarProduto = (id, nome, desc, preco, cat, img) => {
            document.getElementById('produto-id').value = id;
            document.getElementById('nome').value = nome;
            document.getElementById('descricao').value = desc;
            document.getElementById('preco').value = preco;
            document.getElementById('categoria').value = cat;
            document.getElementById('imagemUrl').value = img;
            document.getElementById('titulo-form').innerText = "Editando Sabor";
            document.getElementById('btn-cancelar').classList.remove('hidden');
        };

        function resetForm() { document.getElementById('produto-id').value = ""; document.getElementById('titulo-form').innerText = "Adicionar Novo Sabor"; document.getElementById('btn-cancelar').classList.add('hidden'); }

        // --- BAIRROS ---
        formBairro.addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('bairro-id').value;
            const dados = { nome: document.getElementById('bairro-nome').value, frete: parseFloat(document.getElementById('bairro-frete').value) };
            id ? await updateDoc(doc(db, "bairros", id), dados) : await addDoc(collection(db, "bairros"), dados);
            formBairro.reset();
        });

        function carregarBairros() {
            onSnapshot(collection(db, "bairros"), (snap) => {
                const tbody = document.getElementById('tabela-bairros');
                tbody.innerHTML = "";
                snap.forEach(d => {
                    const b = d.data();
                    tbody.innerHTML += `<tr><td>${b.nome}</td><td>R$ ${b.frete.toFixed(2)}</td><td><button onclick="editarBairro('${d.id}','${b.nome}','${b.frete}')">Editar</button>
                    <button class="btn-excluir" onclick="excluirDoc('bairros','${d.id}')">X</button></td></tr>`;
                });
            });
        }

        window.editarBairro = (id, nome, frete) => { document.getElementById('bairro-id').value = id; document.getElementById('bairro-nome').value = nome; document.getElementById('bairro-frete').value = frete; };

        // --- PEDIDOS (COMPLETO) ---
        function carregarPedidos() {
            const q = query(collection(db, "pedidos"), orderBy("data", "desc"));
            onSnapshot(q, (snap) => {
                const cols = { realizado: document.getElementById('col-realizado'), 'em produção': document.getElementById('col-producao-rota'), 'em rota': document.getElementById('col-producao-rota'), finalizado: document.getElementById('col-finalizado'), cancelado: document.getElementById('col-cancelado') };
                Object.values(cols).forEach(c => c.innerHTML = "");
                
                const agora = new Date();
                const filtro = filtroPeriodo.value;

                snap.forEach(d => {
                    const p = d.data();
                    const dataP = p.data?.toDate();
                    if (dataP && filtro !== "todas") {
                        const horas = (agora - dataP) / (1000 * 60 * 60);
                        if (filtro === "24h" && horas > 24) return;
                        if (filtro === "7d" && horas > 168) return;
                        if (filtro === "30d" && horas > 720) return;
                    }

                    const itens = p.itens?.map(i => `<li>${i.quantidade}x ${i.nome} - R$ ${(i.precoUnitario * i.quantidade).toFixed(2)}</li>`).join('') || '';
                    const card = `<div class="card-pedido">
                        <div style="display:flex; justify-content:space-between; font-weight:bold;"><span>#${d.id.slice(-4).toUpperCase()}</span><span style="font-size:0.7rem; color:#999;">${dataP?.toLocaleString('pt-BR') || '---'}</span></div>
                        <p><strong>👤 ${p.clienteNome}</strong></p>
                        <p>📞 <a href="https://wa.me/55${p.clienteTelefone}" target="_blank" style="color:#25d366; text-decoration:none;">${p.clienteTelefone} <i class="fab fa-whatsapp"></i></a></p>
                        <p style="font-size:0.75rem; color:#666;">📍 ${p.endereco}</p>
                        <ul style="margin:5px 0; padding-left:15px; font-size:0.8rem; border-top:1px solid #eee;">${itens}</ul>
                        <p><strong>💳 ${p.formaPagamento}</strong></p>
                        <p style="color:#d63384; font-weight:bold;">Total: R$ ${p.total.toFixed(2)}</p>
                        <select onchange="atualizarStatusPedido('${d.id}', this.value)" style="font-size:0.75rem; padding:4px; margin-top:5px; margin-bottom:0;">
                            <option value="realizado" ${p.status==='realizado'?'selected':''}>Realizado</option>
                            <option value="em produção" ${p.status==='em produção'?'selected':''}>Produção</option>
                            <option value="em rota" ${p.status==='em rota'?'selected':''}>Em Rota</option>
                            <option value="finalizado" ${p.status==='finalizado'?'selected':''}>Finalizado</option>
                            <option value="cancelado" ${p.status==='cancelado'?'selected':''}>Cancelar</option>
                        </select>
                        <button onclick="excluirDoc('pedidos','${d.id}')" style="background:none; border:none; color:red; cursor:pointer; margin-left:10px;">🗑️</button>
                    </div>`;
                    
                    if (cols[p.status]) cols[p.status].innerHTML += card;
                });
            });
        }

        window.atualizarStatusPedido = async (id, status) => { await updateDoc(doc(db, "pedidos", id), { status, ultimaAtualizacao: serverTimestamp() }); };
        window.excluirDoc = async (pasta, id) => { if(confirm("Excluir permanentemente?")) await deleteDoc(doc(db, pasta, id)); };

        filtroPeriodo.addEventListener('change', carregarPedidos);

        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('conteudo-protegido').style.display = "block";
                monitorarStatusLoja(); carregarHorariosNaTela(); carregarProdutos(); carregarBairros(); carregarPedidos();
            } else { window.location.href = "login.html"; }
        });
    </script>
</body>
</html>
