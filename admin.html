<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Admin - Ninko's Cookies</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .admin-body { background-color: #fae5e7; padding-bottom: 50px; }
        
        .form-admin, .lista-admin { 
            padding: 2rem; max-width: 800px; margin: 2rem auto; 
            background: white; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .form-admin h1, .lista-admin h2 { text-align: center; color: #333; margin-bottom: 1.5rem; }
        input, textarea, select { 
            width: 100%; padding: 0.8rem; margin-bottom: 1rem; 
            border: 1px solid #ccc; border-radius: 5px; font-family: sans-serif; 
        }
        .btn-salvar { 
            background: #f7b2b7; border: 2px solid #5f5f5f; padding: 1rem; 
            cursor: pointer; font-weight: bold; width: 100%; border-radius: 5px;
        }
        table { width: 100%; border-collapse: collapse; margin-top: 1rem; font-size: 0.9rem; }
        th, td { padding: 12px; border-bottom: 1px solid #eee; text-align: left; }
        th { background-color: #f9f9f9; }
        .img-tabela { width: 50px; height: 50px; object-fit: cover; border-radius: 5px; }
        .btn-excluir { background: #ff4d4d; color: white; border: none; padding: 5px 10px; cursor: pointer; border-radius: 3px; }
        
        #conteudo-protegido { display: none; }
        .hidden { display: none; }
        
        .preview-foto { width: 100px; height: 100px; object-fit: cover; border-radius: 8px; border: 2px dashed #f7b2b7; margin-bottom: 10px; display: none; }
        
        .card-pedido { background: #fff; border-radius: 8px; padding: 15px; margin-bottom: 15px; border-left: 5px solid #d63384; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .status-Pendente { color: #f39c12; font-weight: bold; }
        .status-Entregue { color: #27ae60; font-weight: bold; }
        .badge-status { font-size: 0.75rem; padding: 4px 10px; border-radius: 10px; font-weight: bold; text-transform: uppercase; }
        .btn-entregue { background: #27ae60; color: white; border: none; padding: 6px 12px; cursor: pointer; border-radius: 4px; font-size: 0.8rem; margin-top: 10px; }
        .btn-acao-user { cursor: pointer; background: #fff; border: 1px solid #ddd; padding: 5px 10px; border-radius: 4px; font-size: 0.8rem; transition: 0.2s; }
        .btn-acao-user:hover { background: #f9f9f9; border-color: #bbb; }
    </style>
</head>
<body class="admin-body">

    <div class="menu-fixo">
        <header>
            <div class="header-side">
                <a href="index.html" style="text-decoration: none; color: #d63384; font-weight: bold;">← Voltar</a>
            </div> 

            <div class="logo-container">
                <a href="index.html"><img id="img-logo" src="img/logos/ninkos_logo.png" alt="Logo"></a>
            </div>

            <div class="header-side auth-area">
                <div id="menu-user"></div>
                <div id="menu-logout" class="hidden">
                    <a href="#" class="btn-auth-sair" style="text-decoration:none; color:#d63384; font-weight:bold; margin-left: 10px;">Sair</a>
                </div>
            </div>
        </header>
    </div>

    <main id="conteudo-protegido" style="margin-top: 150px;">
        
        <div class="form-admin">
            <h1 id="titulo-form">Adicionar Novo Sabor</h1>
            <form id="form-produto">
                <input type="hidden" id="produto-id"> 
                <input type="text" id="nome" placeholder="Nome do Sabor" required>
                <textarea id="descricao" placeholder="Descrição..." required></textarea>
                <input type="text" id="preco" placeholder="Preço (Ex: 12.00)" required>
                <select id="categoria">
                    <option value="cookies">Cookies</option>
                    <option value="milk-shakes">Milk Shakes</option>
                </select>
                <input type="text" id="imagemUrl" placeholder="Caminho da Imagem (Ex: img/produtos/cookie.jpg)" required>
                <button type="submit" id="btn-submit" class="btn-salvar">Salvar no Cardápio</button>
                <button type="button" id="btn-cancelar" class="hidden" style="margin-top:10px; background:#ccc; border:none; padding:10px; width:100%; cursor:pointer;">Cancelar Edição</button>
            </form>
        </div>

        <div class="lista-admin">
            <h2>Sabores Atuais</h2>
            <table>
                <thead>
                    <tr><th>Foto</th><th>Nome</th><th>Preço</th><th>Ações</th></tr>
                </thead>
                <tbody id="tabela-produtos"></tbody>
            </table>
        </div>

        <hr style="max-width: 800px; margin: 40px auto; border: 1px solid #f7b2b7; opacity: 0.3;">

        <div class="form-admin">
            <h2>Cadastrar Bairro e Frete</h2>
            <form id="form-bairro">
                <input type="text" id="bairro-nome" placeholder="Ex: Centro" required>
                <input type="text" id="bairro-frete" placeholder="Valor do Frete (Ex: 7.00)" required>
                <button type="submit" id="btn-bairro" class="btn-salvar">Adicionar Bairro</button>
            </form>
        </div>

        <div class="lista-admin">
            <h2>Bairros Atendidos</h2>
            <table>
                <thead><tr><th>Bairro</th><th>Taxa</th><th>Ações</th></tr></thead>
                <tbody id="tabela-bairros"></tbody>
            </table>
        </div>

        <div class="lista-admin">
            <h2>👥 Gerenciar Usuários</h2>
            <table>
                <thead><tr><th>Nome</th><th>E-mail</th><th>Cargo</th><th>Ações</th></tr></thead>
                <tbody id="tabela-usuarios"></tbody>
            </table>
        </div>

        <div class="lista-admin">
            <h2>📦 Pedidos Recentes</h2>
            <div id="container-pedidos-admin"></div>
        </div>

    </main>

    <script type="module">
        import { db, auth } from "./firebase-config.js";
        import { collection, addDoc, getDocs, onSnapshot, deleteDoc, doc, updateDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const formProduto = document.getElementById('form-produto');
        const tabelaProdutos = document.getElementById('tabela-produtos');
        const conteudoProtegido = document.getElementById('conteudo-protegido');

        // --- LÓGICA DE PRODUTOS ---
        async function salvarProduto(e) {
            e.preventDefault();
            const id = document.getElementById('produto-id').value;
            const dados = {
                nome: document.getElementById('nome').value,
                descricao: document.getElementById('descricao').value,
                preco: parseFloat(document.getElementById('preco').value),
                categoria: document.getElementById('categoria').value,
                imagemUrl: document.getElementById('imagemUrl').value
            };

            if (id) {
                await updateDoc(doc(db, "produtos", id), dados);
                resetForm();
            } else {
                await addDoc(collection(db, "produtos"), dados);
            }
            formProduto.reset();
        }

        function carregarProdutos() {
            onSnapshot(collection(db, "produtos"), (snapshot) => {
                tabelaProdutos.innerHTML = "";
                snapshot.forEach((docSnap) => {
                    const p = docSnap.data();
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td><img src="${p.imagemUrl}" class="img-tabela"></td>
                        <td>${p.nome}</td>
                        <td>R$ ${p.preco.toFixed(2)}</td>
                        <td>
                            <button class="btn-acao-user" onclick="editarProduto('${docSnap.id}', '${p.nome}', '${p.descricao}', '${p.preco}', '${p.categoria}', '${p.imagemUrl}')">Editar</button>
                            <button class="btn-excluir" onclick="excluirDoc('produtos', '${docSnap.id}')">X</button>
                        </td>
                    `;
                    tabelaProdutos.appendChild(tr);
                });
            });
        }

        // --- LÓGICA DE PEDIDOS ---
        function carregarPedidos() {
            const q = query(collection(db, "pedidos"), orderBy("data", "desc"));
            onSnapshot(q, (snapshot) => {
                const container = document.getElementById('container-pedidos-admin');
                container.innerHTML = "";
                snapshot.forEach((docSnap) => {
                    const pedido = docSnap.data();
                    const data = pedido.data?.toDate().toLocaleString('pt-BR') || '---';
                    const div = document.createElement('div');
                    div.className = 'card-pedido';
                    div.innerHTML = `
                        <div style="display:flex; justify-content:space-between">
                            <strong>Pedido #${docSnap.id.slice(0,5)}</strong>
                            <span class="badge-status status-${pedido.status}">${pedido.status}</span>
                        </div>
                        <p>Cliente: ${pedido.clienteNome} | ${data}</p>
                        <p>Total: R$ ${pedido.total.toFixed(2)}</p>
                        ${pedido.status === 'Pendente' ? `<button class="btn-entregue" onclick="marcarEntregue('${docSnap.id}')">Marcar como Entregue</button>` : ''}
                    `;
                    container.appendChild(div);
                });
            });
        }

        // Funções Globais para os botões inline
        window.excluirDoc = async (pasta, id) => {
            if(confirm("Deseja excluir?")) await deleteDoc(doc(db, pasta, id));
        };

        window.marcarEntregue = async (id) => {
            await updateDoc(doc(db, "pedidos", id), { status: "Entregue" });
        };

        window.editarProduto = (id, nome, desc, preco, cat, img) => {
            document.getElementById('produto-id').value = id;
            document.getElementById('nome').value = nome;
            document.getElementById('descricao').value = desc;
            document.getElementById('preco').value = preco;
            document.getElementById('categoria').value = cat;
            document.getElementById('imagemUrl').value = img;
            document.getElementById('titulo-form').innerText = "Editando Sabor";
            document.getElementById('btn-cancelar').classList.remove('hidden');
        };

        function resetForm() {
            document.getElementById('produto-id').value = "";
            document.getElementById('titulo-form').innerText = "Adicionar Novo Sabor";
            document.getElementById('btn-cancelar').classList.add('hidden');
            formProduto.reset();
        }

        formProduto.addEventListener('submit', salvarProduto);
        document.getElementById('btn-cancelar').addEventListener('click', resetForm);

        // Inicialização
        auth.onAuthStateChanged(user => {
            if (user) {
                conteudoProtegido.style.display = "block";
                carregarProdutos();
                carregarPedidos();
            } else {
                window.location.href = "login.html";
            }
        });

    </script>
    <script type="module" src="auth-control.js"></script>
</body>
</html>
