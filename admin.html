<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Admin - Ninko's Cookies</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .admin-body { background-color: #fae5e7; padding-bottom: 50px; }
        .form-admin, .lista-admin { 
            padding: 2rem; max-width: 800px; margin: 2rem auto; 
            background: white; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .form-admin h1, .lista-admin h2 { text-align: center; color: #333; margin-bottom: 1.5rem; }
        input, textarea, select { 
            width: 100%; padding: 0.8rem; margin-bottom: 1rem; 
            border: 1px solid #ccc; border-radius: 5px; font-family: sans-serif; 
        }
        .btn-salvar { 
            background: #f7b2b7; border: 2px solid #5f5f5f; padding: 1rem; 
            cursor: pointer; font-weight: bold; width: 100%; border-radius: 5px;
        }
        table { width: 100%; border-collapse: collapse; margin-top: 1rem; font-size: 0.9rem; }
        th, td { padding: 12px; border-bottom: 1px solid #eee; text-align: left; }
        th { background-color: #f9f9f9; }
        .img-tabela { width: 50px; height: 50px; object-fit: cover; border-radius: 5px; }
        .btn-excluir { background: #ff4d4d; color: white; border: none; padding: 5px 10px; cursor: pointer; border-radius: 3px; }
        #conteudo-protegido { display: none; }
        .hidden { display: none; }
        .preview-foto { width: 100px; height: 100px; object-fit: cover; border-radius: 8px; border: 2px dashed #f7b2b7; margin-bottom: 10px; display: none; }
        
        /* Estilos Novos para Pedidos */
        .card-pedido { background: #fff; border-radius: 8px; padding: 15px; margin-bottom: 15px; border-left: 5px solid #d63384; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .status-Pendente { color: #f39c12; font-weight: bold; }
        .status-Entregue { color: #27ae60; font-weight: bold; }
        .badge-status { font-size: 0.75rem; padding: 3px 8px; border-radius: 10px; background: #eee; }
        .btn-entregue { background: #27ae60; color: white; border: none; padding: 6px 12px; cursor: pointer; border-radius: 4px; font-size: 0.8rem; margin-top: 10px; }
    </style>
</head>
<body class="admin-body">

    <div class="menu-fixo">
        <header>
            <div class="header-side"></div>
            <div class="logo-container">
                <a href="index.html"><img id="img-logo" src="img/logos/ninkos_logo.png" alt="Logo"></a>
            </div>
            <div class="header-side auth-area">
                <div id="menu-user"></div>
                <div id="menu-logout" class="hidden">
                    <a href="#" class="btn-auth-sair" style="text-decoration:none; color:#d63384; font-weight:bold;">Sair</a>
                </div>
            </div>
        </header>

        <nav>
            <h1>Painel Administrativo</h1>
            <ul>
                <li><a href="index.html" class="botao-navegacao">Início</a></li>
                <li><a href="#" class="botao-navegacao ativo">Gerenciar Tudo</a></li>
            </ul>
        </nav>
    </div>

    <main id="conteudo-protegido" style="margin-top: 240px;">
        
        

        <div class="form-admin">
            <h1 id="titulo-form">Adicionar Novo Sabor</h1>
            <form id="form-produto">
                <input type="hidden" id="produto-id"> 
                <input type="text" id="nome" placeholder="Nome do Sabor" required>
                <textarea id="descricao" placeholder="Descrição..." required></textarea>
                <input type="text" id="preco" placeholder="Preço (Ex: 12.00)" required>
                <select id="categoria">
                    <option value="cookies">Cookies</option>
                    <option value="milk-shakes">Milk Shakes</option>
                </select>

                <label style="font-weight: bold; font-size: 0.9rem;">Caminho da Imagem Local:</label>
                <input type="text" id="imagemUrl" placeholder="Ex: img/produtos/cookie-ninho.jpg" required>
                <img id="img-preview" class="preview-foto">
                
                <button type="submit" id="btn-submit" class="btn-salvar">Salvar no Cardápio</button>
                <button type="button" id="btn-cancelar" class="hidden" style="margin-top:10px; background:#ccc; border:none; padding:10px; width:100%; cursor:pointer;">Cancelar Edição</button>
            </form>
        </div>

        <div class="lista-admin">
            <h2>Sabores Atuais</h2>
            <table>
                <thead>
                    <tr>
                        <th>Foto</th>
                        <th>Nome</th>
                        <th>Preço</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="tabela-produtos"></tbody>
            </table>
        </div>

        <hr style="max-width: 800px; margin: 40px auto; border: 1px solid #f7b2b7; opacity: 0.3;">

        <div class="form-admin">
            <h2>Cadastrar Bairro e Frete</h2>
            <form id="form-bairro">
                <input type="text" id="bairro-nome" placeholder="Ex: Centro" required>
                <input type="text" id="bairro-frete" placeholder="Valor do Frete (Ex: 7.00)" required>
                <button type="submit" id="btn-bairro" class="btn-salvar">Adicionar Bairro</button>
            </form>
        </div>

        <div class="lista-admin">
            <h2>Bairros Atendidos</h2>
            <table>
                <thead>
                    <tr>
                        <th>Bairro</th>
                        <th>Taxa de Entrega</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="tabela-bairros"></tbody>
            </table>
        </div>

        <div class="lista-admin">
            <h2>📦 Pedidos Recentes</h2>
            <div id="container-pedidos-admin">
                <p style="text-align: center;">Buscando novos pedidos... 🍪</p>
            </div>
        </div>

    </main>

    <script type="module" src="auth-control.js"></script>

    <script type="module">
        import { auth, db } from "./firebase-config.js";
        import { collection, addDoc, onSnapshot, query, orderBy, doc, deleteDoc, updateDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // 1. TRAVA DE SEGURANÇA
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const docSnap = await getDoc(doc(db, "usuarios", user.uid));
                const dados = docSnap.data();
                if (dados && (dados.isAdmin === true || dados.regra === 'admin')) {
                    document.getElementById('conteudo-protegido').style.display = 'block';
                } else {
                    alert("Acesso negado!");
                    window.location.href = "index.html";
                }
            } else {
                window.location.href = "login.html";
            }
        });

        // --- LÓGICA DE PEDIDOS (NOVA) ---
        const qPed = query(collection(db, "pedidos"), orderBy("data", "desc"));
        onSnapshot(qPed, (snapshot) => {
            const container = document.getElementById('container-pedidos-admin');
            if (snapshot.empty) {
                container.innerHTML = "<p style='text-align:center;'>Nenhum pedido recebido ainda.</p>";
                return;
            }
            container.innerHTML = "";
            snapshot.forEach((docPed) => {
                const p = docPed.data();
                const id = docPed.id;
                const dataPedido = p.data ? p.data.toDate().toLocaleString('pt-BR') : 'Agora';

                let itensList = p.itens.map(i => `• ${i.quantidade}x ${i.nome}`).join('<br>');

                const card = document.createElement('div');
                card.className = 'card-pedido';
                card.innerHTML = `
                    <div style="font-size:0.8rem; margin-bottom:5px; display:flex; justify-content:space-between;">
                        <span>📅 ${dataPedido}</span>
                        <span class="badge-status status-${p.status}">${p.status}</span>
                    </div>
                    <strong>👤 ${p.clienteNome}</strong><br>
                    <small>📍 ${p.endereco}</small><br>
                    <div style="background:#f9f9f9; padding:8px; margin:8px 0; border-radius:4px; font-size:0.85rem;">
                        ${itensList}
                    </div>
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <strong>Total: R$ ${p.total.toFixed(2)}</strong>
                        ${p.status === 'Pendente' ? `<button class="btn-entregue" onclick="marcarComoEntregue('${id}')">Finalizar ✅</button>` : ''}
                    </div>
                `;
                container.appendChild(card);
            });
        });

        window.marcarComoEntregue = async (id) => {
            if(confirm("Deseja marcar como entregue?")) {
                await updateDoc(doc(db, "pedidos", id), { status: "Entregue" });
            }
        };

        // --- LÓGICA DE PRODUTOS ---

        document.getElementById('imagemUrl').addEventListener('input', (e) => {
            const preview = document.getElementById('img-preview');
            if (e.target.value) {
                preview.src = e.target.value;
                preview.style.display = 'block';
                preview.onerror = () => { preview.style.display = 'none'; };
            }
        });

        const qProd = query(collection(db, "produtos"), orderBy("nome", "asc"));
        onSnapshot(qProd, (snapshot) => {
            const tbody = document.getElementById('tabela-produtos');
            tbody.innerHTML = "";
            snapshot.forEach((res) => {
                const p = res.data();
                tbody.innerHTML += `
                    <tr>
                        <td><img src="${p.imagemUrl || 'img/logos/ninkos_logo.png'}" class="img-tabela"></td>
                        <td>${p.nome}</td>
                        <td>R$ ${parseFloat(p.preco).toFixed(2)}</td>
                        <td>
                            <button onclick="prepararEdicao('${res.id}', '${p.nome}', '${p.descricao.replace(/'/g, "\\'")}', '${p.preco}', '${p.categoria}', '${p.imagemUrl}')" style="cursor:pointer; background: #eee; border:1px solid #999; padding: 5px;">✏️</button>
                            <button class="btn-excluir" onclick="excluirProduto('${res.id}', '${p.nome}')">🗑️</button>
                        </td>
                    </tr>`;
            });
        });

        document.getElementById('form-produto').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-submit');
            const id = document.getElementById('produto-id').value;
            btn.innerText = "Processando... 🍪";
            btn.disabled = true;

            try {
                const dados = {
                    nome: document.getElementById('nome').value,
                    descricao: document.getElementById('descricao').value,
                    preco: parseFloat(document.getElementById('preco').value.replace(',', '.')),
                    categoria: document.getElementById('categoria').value,
                    imagemUrl: document.getElementById('imagemUrl').value || "img/logos/ninkos_logo.png"
                };

                if (id) await updateDoc(doc(db, "produtos", id), dados);
                else await addDoc(collection(db, "produtos"), dados);
                
                resetarForm();
                alert("Salvo com sucesso!");
            } catch (err) { alert("Erro ao salvar."); } 
            finally {
                btn.innerText = id ? "Salvar Alterações" : "Salvar no Cardápio";
                btn.disabled = false;
            }
        };

        window.excluirProduto = async (id, nome) => {
            if (confirm(`Deseja remover "${nome}"?`)) await deleteDoc(doc(db, "produtos", id));
        };

        window.prepararEdicao = (id, nome, desc, preco, cat, img) => {
            document.getElementById('produto-id').value = id;
            document.getElementById('nome').value = nome;
            document.getElementById('descricao').value = desc;
            document.getElementById('preco').value = preco;
            document.getElementById('categoria').value = cat;
            document.getElementById('imagemUrl').value = img;
            const preview = document.getElementById('img-preview');
            preview.src = img || 'img/logos/ninkos_logo.png';
            preview.style.display = 'block';
            document.getElementById('titulo-form').innerText = "Editando Sabor";
            document.getElementById('btn-submit').innerText = "Salvar Alterações";
            document.getElementById('btn-cancelar').classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        function resetarForm() {
            document.getElementById('form-produto').reset();
            document.getElementById('produto-id').value = "";
            document.getElementById('img-preview').style.display = 'none';
            document.getElementById('titulo-form').innerText = "Adicionar Novo Sabor";
            document.getElementById('btn-submit').innerText = "Salvar no Cardápio";
            document.getElementById('btn-cancelar').classList.add('hidden');
        }
        window.resetarForm = resetarForm;
        document.getElementById('btn-cancelar').onclick = resetarForm;


        // --- LÓGICA DE BAIRROS ---

        const formBairro = document.getElementById('form-bairro');
        const tabelaBairros = document.getElementById('tabela-bairros');

        formBairro.onsubmit = async (e) => {
            e.preventDefault();
            const btnB = document.getElementById('btn-bairro');
            const nome = document.getElementById('bairro-nome').value;
            const frete = parseFloat(document.getElementById('bairro-frete').value.replace(',', '.'));

            btnB.innerText = "Adicionando...";
            btnB.disabled = true;

            try {
                await addDoc(collection(db, "bairros"), { nome: nome, frete: frete });
                formBairro.reset();
            } catch (err) { alert("Erro ao salvar bairro."); } 
            finally {
                btnB.innerText = "Adicionar Bairro";
                btnB.disabled = false;
            }
        };

        const qBairros = query(collection(db, "bairros"), orderBy("nome", "asc"));
        onSnapshot(qBairros, (snapshot) => {
            tabelaBairros.innerHTML = "";
            snapshot.forEach((res) => {
                const b = res.data();
                tabelaBairros.innerHTML += `
                    <tr>
                        <td>${b.nome}</td>
                        <td>R$ ${parseFloat(b.frete).toFixed(2)}</td>
                        <td>
                            <button class="btn-excluir" onclick="excluirBairro('${res.id}', '${b.nome}')">🗑️</button>
                        </td>
                    </tr>`;
            });
        });

        window.excluirBairro = async (id, nome) => {
            if (confirm(`Remover o bairro "${nome}"?`)) await deleteDoc(doc(db, "bairros", id));
        };

    </script>
</body>
</html>
