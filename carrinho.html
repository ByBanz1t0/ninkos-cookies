<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Carrinho - Ninko's Cookies</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="menu-fixo">
        <header>
            <div class="header-side">
                <a href="index.html" style="text-decoration: none; color: #d63384; font-weight: bold;">← Voltar</a>
            </div> 

            <div class="logo-container">
                <a href="index.html">
                    <img id="img-logo" src="img/logos/ninkos_logo.png" alt="Logo da Ninko's Cookies">
                </a>
            </div>

            <div class="header-side auth-area">
                <div id="menu-user"></div>
            </div>
        </header>
    </div>

    <main class="conteudo-carrinho">
        <section class="secao-checkout">
            <h2>Seu Pedido 🛒</h2>
            
            <div id="lista-carrinho">
                <p class="carrinho-vazio">Seu carrinho está triste e vazio... 🍪</p>
            </div>

            <div class="resumo-pedido" id="resumo-area" style="display: none;">
                <div class="linha-total">
                    <span>Total do Pedido:</span>
                    <strong id="valor-total-carrinho">R$ 0,00</strong>
                </div>

                <div class="checkout-form">
                    <h3>🏠 Dados para Entrega:</h3>
                    <input type="text" id="cliente-nome" placeholder="Seu Nome Completo" required>
                    <input type="text" id="cliente-endereco" placeholder="Endereço (Rua, Número, Bairro)" required>
                    <select id="cliente-pagamento" required>
                        <option value="">Forma de Pagamento</option>
                        <option value="Pix">Pix</option>
                        <option value="Cartão (Maquininha)">Cartão (Maquininha)</option>
                        <option value="Dinheiro">Dinheiro</option>
                    </select>
                </div>
                
                <button class="btn-prosseguir" onclick="enviarParaWhatsApp()">
                    Finalizar e Enviar para o WhatsApp 🚀
                </button>
                <button class="btn-limpar" onclick="limparCarrinho()">Limpar Carrinho</button>
            </div>
        </section>
    </main>

    <script>
        let carrinho = JSON.parse(localStorage.getItem('carrinhoNinkos')) || [];

        function renderizarCarrinho() {
            const container = document.getElementById('lista-carrinho');
            const resumo = document.getElementById('resumo-area');
            const totalDisplay = document.getElementById('valor-total-carrinho');
            
            if (carrinho.length === 0) {
                container.innerHTML = '<p class="carrinho-vazio">Seu carrinho está vazio. Que tal adicionar uns cookies? 🍪</p>';
                resumo.style.display = 'none';
                return;
            }

            resumo.style.display = 'block';
            container.innerHTML = ''; 
            let totalGeral = 0;

            carrinho.forEach((item, index) => {
                const subtotal = item.preco * item.quantidade;
                totalGeral += subtotal;

                container.innerHTML += `
                    <div class="item-carrinho">
                        <div class="item-visual">
                            <img src="${item.imagemUrl || 'img/padrao.jpg'}" alt="${item.nome}" class="item-foto-carrinho">
                            <div class="item-info">
                                <span class="item-nome">${item.nome}</span>
                                <span class="item-preco-unit">R$ ${item.preco.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</span>
                            </div>
                        </div>
                        <div class="item-controles">
                            <div class="qtd-botoes">
                                <button onclick="mudarQtd(${index}, -1)">-</button>
                                <span class="qtd-display">${item.quantidade}</span>
                                <button onclick="mudarQtd(${index}, 1)">+</button>
                            </div>
                            <span class="item-subtotal">R$ ${subtotal.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</span>
                            <button class="btn-remover" onclick="removerItem(${index})">🗑️</button>
                        </div>
                    </div>
                `;
            });

            totalDisplay.innerText = totalGeral.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
        }

        function mudarQtd(index, delta) {
            carrinho[index].quantidade += delta;
            if (carrinho[index].quantidade <= 0) {
                removerItem(index);
            } else {
                salvarEAtualizar();
            }
        }

        function removerItem(index) {
            carrinho.splice(index, 1);
            salvarEAtualizar();
        }

        function limparCarrinho() {
            if(confirm("Deseja realmente esvaziar seu carrinho?")) {
                carrinho = [];
                salvarEAtualizar();
            }
        }

        function salvarEAtualizar() {
            localStorage.setItem('carrinhoNinkos', JSON.stringify(carrinho));
            renderizarCarrinho();
        }

        function enviarParaWhatsApp() {
            const nome = document.getElementById('cliente-nome').value.trim();
            const endereco = document.getElementById('cliente-endereco').value.trim();
            const pagamento = document.getElementById('cliente-pagamento').value;

            if (!nome || !endereco || !pagamento) {
                alert("Por favor, preencha todos os campos para a entrega! 🍪");
                return;
            }

            let mensagemProdutos = "";
            let totalGeral = 0;

            carrinho.forEach(item => {
                const subtotal = item.preco * item.quantidade;
                totalGeral += subtotal;
                mensagemProdutos += `• *${item.quantidade}x* ${item.nome} - R$ ${subtotal.toLocaleString('pt-BR', {minimumFractionDigits: 2})}\n`;
            });

            const totalFormatado = totalGeral.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });

            const textoWhatsApp = encodeURIComponent(
                `*NOVO PEDIDO - NINKO'S COOKIES* 🍪\n\n` +
                `👤 *Cliente:* ${nome}\n` +
                `📍 *Endereço:* ${endereco}\n` +
                `💳 *Pagamento:* ${pagamento}\n\n` +
                `*ÍTENS DO PEDIDO:*\n${mensagemProdutos}\n` +
                `*TOTAL:* ${totalFormatado}\n\n` +
                `_Aguardando confirmação do pedido..._`
            );

            const numeroWhats = "5582999608947"; 
            window.open(`https://wa.me/${numeroWhats}?text=${textoWhatsApp}`, '_blank');
        }

        // Inicializa a tela
        renderizarCarrinho();
    </script>

</body>
</html>
