<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Pedidos - Admin</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .card-pedido { background: #fff; border-radius: 8px; padding: 15px; margin-bottom: 20px; border-left: 5px solid #d63384; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .status-pendente { color: #f39c12; font-weight: bold; }
        .status-entregue { color: #27ae60; font-weight: bold; }
        .info-cliente { margin-bottom: 10px; padding-bottom: 10px; border-bottom: 1px dashed #eee; }
        .item-lista { font-size: 0.9rem; color: #444; margin-left: 10px; }
        .badge-status { padding: 4px 8px; border-radius: 4px; font-size: 0.8rem; text-transform: uppercase; }
        .btn-status { background: #27ae60; color: white; border: none; padding: 8px; border-radius: 4px; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body class="admin-body">
    <header style="text-align: center; padding: 20px;">
        <h2>Gerenciar Pedidos 🍪</h2>
        <a href="admin.html">← Voltar para Painel Geral</a>
    </header>

    <main style="max-width: 800px; margin: auto; padding: 20px;">
        <div id="lista-pedidos-admin">
            <p>Carregando pedidos...</p>
        </div>
    </main>

    <script type="module">
        import { db } from "./firebase-config.js";
        import { collection, query, orderBy, onSnapshot, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const container = document.getElementById('lista-pedidos-admin');

        // Escuta os pedidos em tempo real
        const q = query(collection(db, "pedidos"), orderBy("data", "desc"));

        onSnapshot(q, (snapshot) => {
            if (snapshot.empty) {
                container.innerHTML = "<p>Nenhum pedido realizado ainda. 📭</p>";
                return;
            }

            container.innerHTML = "";
            snapshot.forEach((pedidoDoc) => {
                const p = pedidoDoc.data();
                const id = pedidoDoc.id;
                const dataFormatada = p.data ? p.data.toDate().toLocaleString('pt-BR') : 'Agora';

                const div = document.createElement('div');
                div.className = 'card-pedido';
                
                // Gerar lista de itens
                let itensHTML = p.itens.map(item => `
                    <div class="item-lista">• ${item.quantidade}x ${item.nome} (R$ ${item.precoUnitario.toFixed(2)})</div>
                `).join('');

                div.innerHTML = `
                    <div class="info-cliente">
                        <strong>👤 ${p.clienteNome}</strong> - <small>${dataFormatada}</small><br>
                        📱 ${p.clienteTelefone} | 📍 ${p.bairro}<br>
                        🏠 ${p.endereco}
                    </div>
                    <div class="itens-pedido">
                        ${itensHTML}
                    </div>
                    <div style="margin-top: 10px; font-weight: bold;">
                        <span>Total: R$ ${p.total.toFixed(2)}</span> 
                        <span class="badge-status ${p.status === 'Entregue' ? 'status-entregue' : 'status-pendente'}">
                            [${p.status}]
                        </span>
                    </div>
                    ${p.status !== 'Entregue' ? `<button class="btn-status" onclick="marcarComoEntregue('${id}')">Marcar como Entregue ✅</button>` : ''}
                `;
                container.appendChild(div);
            });
        });

        // Função para atualizar status (global para o navegador encontrar no onclick)
        window.marcarComoEntregue = async (id) => {
            if(confirm("Deseja marcar este pedido como entregue?")) {
                const pedidoRef = doc(db, "pedidos", id);
                await updateDoc(pedidoRef, { status: "Entregue" });
            }
        };
    </script>
</body>
</html>
