<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Perfil - Ninko's Cookies</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* Apenas o necessário para o conteúdo não ficar por baixo do menu fixo */
        #conteudo-perfil { display: none; margin-top: 150px; }
    </style>
</head>
<body>

    <div class="menu-fixo">
        <header>
            <div class="header-side">
                <a href="index.html" style="text-decoration: none; color: #d63384; font-weight: bold;">← Voltar</a>
            </div> 

            <div class="logo-container">
                <a href="index.html"><img id="img-logo" src="img/logos/ninkos_logo.png" alt="Logo"></a>
            </div>

            <div class="header-side auth-area">
                <div id="menu-user"></div>
                <div id="menu-logout" class="hidden">
                    <a href="#" class="btn-auth-sair" style="text-decoration:none; color:#d63384; font-weight:bold; margin-left: 10px;">Sair</a>
                </div>
            </div>
        </header>
    </div>

    <main id="conteudo-perfil">
        <div class="card-perfil">
            <h1>Meus Dados</h1>
            
            <form id="form-perfil">
                <label>Nome Completo:</label>
                <input type="text" id="perfil-nome" placeholder="Seu nome" required>

                <label>WhatsApp:</label>
                <input type="text" id="perfil-telefone" placeholder="(00) 00000-0000" required>

                <label>Bairro:</label>
                <select id="perfil-bairro" required>
                    <option value="">Selecione seu bairro...</option>
                </select>

                <label>Rua e Número:</label>
                <input type="text" id="perfil-rua" placeholder="Ex: Rua das Flores, 123" required>

                <label>Ponto de Referência:</label>
                <input type="text" id="perfil-referencia" placeholder="Perto de onde?">

                <button type="submit" class="btn-finalizar-checkout">Salvar Alterações</button>
                
                </form>
        </div>
    </main>

    <script type="module">
        import { db, auth } from "./firebase-config.js";
        import { doc, getDoc, updateDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const form = document.getElementById('form-perfil');
        const selectBairro = document.getElementById('perfil-bairro');
        const conteudo = document.getElementById('conteudo-perfil');

        async function carregarBairros() {
            const querySnapshot = await getDocs(collection(db, "bairros"));
            querySnapshot.forEach((doc) => {
                const bairro = doc.data();
                const option = document.createElement('option');
                option.value = bairro.nome;
                option.textContent = `${bairro.nome} (Taxa: R$ ${bairro.frete.toFixed(2)})`;
                selectBairro.appendChild(option);
            });
        }

        auth.onAuthStateChanged(async (user) => {
            if (user) {
                conteudo.style.display = "block";
                await carregarBairros();
                
                const userDoc = await getDoc(doc(db, "usuarios", user.uid));
                if (userDoc.exists()) {
                    const dados = userDoc.data();
                    document.getElementById('perfil-nome').value = dados.nome || "";
                    document.getElementById('perfil-telefone').value = dados.telefone || "";
                    document.getElementById('perfil-bairro').value = dados.bairro || "";
                    document.getElementById('perfil-rua').value = dados.rua || "";
                    document.getElementById('perfil-referencia').value = dados.referencia || "";
                }
            } else {
                window.location.href = "login.html";
            }
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const user = auth.currentUser;
            if (user) {
                const novosDados = {
                    nome: document.getElementById('perfil-nome').value,
                    telefone: document.getElementById('perfil-telefone').value,
                    bairro: document.getElementById('perfil-bairro').value,
                    rua: document.getElementById('perfil-rua').value,
                    referencia: document.getElementById('perfil-referencia').value,
                };

                try {
                    await updateDoc(doc(db, "usuarios", user.uid), novosDados);
                    alert("Dados atualizados com sucesso! 🍪");
                } catch (error) {
                    console.error(error);
                    alert("Erro ao salvar.");
                }
            }
        });
    </script>
    <script type="module" src="auth-control.js"></script>
</body>
</html>
