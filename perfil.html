<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ninko's Cookies | Meu Perfil</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* Apenas o essencial para o controle de exibição do JS */
        .conteudo-perfil { display: none; }
    </style>
</head>
<body>

    <div class="menu-fixo">
        <header>
            <div class="header-side">
                <a href="index.html" class="btn-auth" style="display: flex; align-items: center; gap: 8px;">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
                    Voltar
                </a>
            </div> 

            <div class="logo-container">
                <a href="index.html">
                    <img id="img-logo" src="img/logos/ninkos_logo.png" alt="Logo da Ninko's Cookies">
                </a>
            </div>

            <div class="header-side auth-area"></div>
        </header>
    </div>

    <main id="conteudo-perfil" class="conteudo-perfil">
        
        <div id="card-fidelidade" class="card-fidelidade" style="display: none;">
            <h3>✨ Seus Ninko Points</h3>
            <p>Você tem <strong id="saldo-pontos">0</strong> pontos</p>
            <small>Continue pedindo para ganhar mais cookies!</small>
        </div>

        <div class="perfil-container">
            <h2 id="saudacao">Carregando...</h2>
            <p style="text-align: center; margin-bottom: 2rem; font-size: 0.85rem; color: #666;">Mantenha seus dados atualizados!</p>

            <div id="info-box">
                </div>

            <button id="btn-salvar" class="btn-comprar" style="width: 100%; margin-top: 10px;">
                Salvar Alterações
            </button>
        </div>
    </main>

    <script type="module">
        import { auth, db } from "./firebase-config.js";
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { doc, getDoc, setDoc, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { mostrarNotificacao } from "./auth-control.js";

        let usuarioLogado = null;

        async function obterOpcoesBairros(bairroAtual) {
            const q = query(collection(db, "bairros"), orderBy("nome", "asc"));
            const snapshot = await getDocs(q);
            let html = `<select id="p-bairro" required>`;
            html += `<option value="">Selecione seu bairro...</option>`;
            snapshot.forEach(doc => {
                const b = doc.data();
                const selecionado = b.nome === bairroAtual ? "selected" : "";
                html += `<option value="${b.nome}" ${selecionado}>${b.nome}</option>`;
            });
            html += `</select>`;
            return html;
        }

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                usuarioLogado = user;
                try {
                    const docSnap = await getDoc(doc(db, "usuarios", user.uid));
                    const infoBox = document.getElementById('info-box');
                    const saudacao = document.getElementById('saudacao');
                    const cardFid = document.getElementById('card-fidelidade');
                    const saldoPontos = document.getElementById('saldo-pontos');
                    const mainContent = document.getElementById('conteudo-perfil');

                    const d = docSnap.exists() ? docSnap.data() : {};
                    const primeiroNome = d.nome ? d.nome.split(' ')[0] : "Usuário";
                    saudacao.innerText = `Olá, ${primeiroNome}! 🍪`;
                    
                    if(cardFid) {
                        cardFid.style.display = "block";
                        saldoPontos.innerText = d.pontos || 0;
                    }

                    const selectBairrosHTML = await obterOpcoesBairros(d.bairro || "");
                    
                    infoBox.innerHTML = `
                        <div class="campo-perfil">
                            <label>Nome Completo:</label>
                            <input type="text" id="p-nome" value="${d.nome || ''}">
                        </div>
                        <div class="campo-perfil">
                            <label>WhatsApp:</label>
                            <input type="text" id="p-tel" value="${d.telefone || ''}">
                        </div>
                        <div class="campo-perfil">
                            <label>CEP:</label>
                            <input type="text" id="p-cep" value="${d.cep || ''}">
                        </div>
                        <div class="campo-perfil">
                            <label>Bairro:</label>
                            ${selectBairrosHTML}
                        </div>
                        <div class="campo-perfil">
                            <label>Rua:</label>
                            <input type="text" id="p-rua" value="${d.rua || ''}">
                        </div>
                        <div class="grid-campos">
                            <div class="campo-perfil">
                                <label>Nº:</label>
                                <input type="text" id="p-num" value="${d.numero || ''}">
                            </div>
                            <div class="campo-perfil">
                                <label>Complemento:</label>
                                <input type="text" id="p-comp" value="${d.complemento || ''}">
                            </div>
                        </div>
                    `;
                    mainContent.style.display = "block";
                } catch (error) { console.error(error); }
            } else { window.location.href = "login.html"; }
        });

        document.getElementById('btn-salvar').addEventListener('click', async () => {
            if (!usuarioLogado) return;
            const btn = document.getElementById('btn-salvar');
            btn.innerText = "Salvando...";
            btn.disabled = true;

            try {
                await setDoc(doc(db, "usuarios", usuarioLogado.uid), {
                    nome: document.getElementById('p-nome').value,
                    telefone: document.getElementById('p-tel').value,
                    cep: document.getElementById('p-cep').value,
                    bairro: document.getElementById('p-bairro').value,
                    rua: document.getElementById('p-rua').value,
                    numero: document.getElementById('p-num').value,
                    complemento: document.getElementById('p-comp').value,
                    atualizadoEm: new Date()
                }, { merge: true });

                mostrarNotificacao("Perfil atualizado! 🍪", "✅");
                setTimeout(() => window.location.reload(), 1500);
            } catch (e) {
                mostrarNotificacao("Erro ao salvar.", "❌");
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
