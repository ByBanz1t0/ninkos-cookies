<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ninko's Cookies | Meu Perfil</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="menu-fixo">
        <header>
            <div class="header-side"></div> 

            <div class="logo-container">
                <a href="index.html">
                    <img id="img-logo" src="img/logos/ninkos_logo.png" alt="Logo da Ninko's Cookies">
                </a>
            </div>

            <div class="header-side auth-area">
                <div id="menu-user"></div>

                <div id="menu-logout" class="hidden">
                    <a href="#" class="btn-auth-sair" id="btn-sair-link">Sair</a>
                </div>
            </div>
        </header>
    </div>

    <main class="conteudo-perfil" style="margin-top: 180px; padding: 2rem;">
        <h2 id="saudacao">Carregando perfil...</h2>
        <p>Mantenha seus dados atualizados para facilitar suas entregas!</p>

        <div id="info-box" class="perfil-container">
            <p style="text-align: center; color: #f7b2b7;">Buscando seus dados no forno... 🍪</p>
        </div>

        <div style="text-align: center; margin-top: 2rem;">
            <button id="btn-salvar" class="btn-comprar" style="width: 100%; max-width: 400px; padding: 1rem;">
                Salvar Alterações
            </button>
            <br><br>
            <a href="index.html" style="color: #5b3c11; text-decoration: none; font-size: 0.9rem;">← Voltar ao Cardápio</a>
        </div>
    </main>

    <script type="module">
        // Importamos a conexão e as funções necessárias (Adicionei o setDoc)
        import { auth, db } from "./firebase-config.js";
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        let usuarioLogado = null;

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                usuarioLogado = user;
                try {
                    const docSnap = await getDoc(doc(db, "usuarios", user.uid));
                    const infoBox = document.getElementById('info-box');
                    const saudacao = document.getElementById('saudacao');

                    // Preparamos os dados (se não existirem, ficam vazios)
                    const d = docSnap.exists() ? docSnap.data() : {};
                    
                    const primeiroNome = d.nome ? d.nome.split(' ')[0] : "Usuário";
                    saudacao.innerText = `Olá, ${primeiroNome}! 🍪`;
                    
                    // Injeção dos inputs com os IDs corretos para o salvamento
                    infoBox.innerHTML = `
                        <div class="campo-perfil">
                            <label>Nome Completo:</label>
                            <input type="text" id="p-nome" value="${d.nome || ''}" placeholder="Seu nome completo">
                        </div>
                        <div class="campo-perfil">
                            <label>WhatsApp:</label>
                            <input type="text" id="p-tel" value="${d.telefone || ''}" placeholder="(00) 00000-0000">
                        </div>
                        <div class="campo-perfil">
                            <label>CEP:</label>
                            <input type="text" id="p-cep" value="${d.cep || ''}" placeholder="00000-000">
                        </div>
                        <div class="campo-perfil">
                            <label>Bairro:</label>
                            <input type="text" id="p-bairro" value="${d.bairro || ''}">
                        </div>
                        <div class="campo-perfil">
                            <label>Rua:</label>
                            <input type="text" id="p-rua" value="${d.rua || ''}">
                        </div>
                        <div class="campo-perfil" style="display: flex; gap: 10px;">
                            <div style="flex: 1;">
                                <label>Nº:</label>
                                <input type="text" id="p-num" value="${d.numero || ''}">
                            </div>
                            <div style="flex: 2;">
                                <label>Complemento:</label>
                                <input type="text" id="p-comp" value="${d.complemento || ''}">
                            </div>
                        </div>
                    `;
                } catch (error) {
                    console.error("Erro ao carregar perfil:", error);
                }
            } else { 
                window.location.href = "login.html"; 
            }
        });

        // Lógica do botão Salvar (CORRIGIDA COM SETDOC + MERGE)
        document.getElementById('btn-salvar').addEventListener('click', async () => {
            if (!usuarioLogado) return;

            const btn = document.getElementById('btn-salvar');
            btn.innerText = "Salvando...";
            btn.disabled = true;

            try {
                // setDoc com { merge: true } cria o documento se ele não existir
                await setDoc(doc(db, "usuarios", usuarioLogado.uid), {
                    nome: document.getElementById('p-nome').value,
                    telefone: document.getElementById('p-tel').value,
                    cep: document.getElementById('p-cep').value,
                    bairro: document.getElementById('p-bairro').value,
                    rua: document.getElementById('p-rua').value,
                    numero: document.getElementById('p-num').value,
                    complemento: document.getElementById('p-comp').value,
                    atualizadoEm: new Date()
                }, { merge: true });

                alert("Dados atualizados com sucesso! 🍪");
                
                // Opcional: recarrega para atualizar o nome no menu caso tenha mudado
                window.location.reload();

            } catch (e) {
                console.error("Erro ao salvar:", e);
                alert("Erro ao salvar. Verifique se você preencheu tudo corretamente.");
            } finally {
                btn.innerText = "Salvar Alterações";
                btn.disabled = false;
            }
        });
    </script>

    <script type="module" src="auth-control.js"></script>
</body>
</html>
